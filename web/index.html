<!DOCTYPE html>
<html>
<head>
  <!-- BREAK CACHE -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  
  <base href="/">
 
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Parish Records Management System">
  
  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="parishrecord">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>parishrecord</title>
  <link rel="manifest" href="manifest.json">

  <script>
    // The value below is injected by flutter build, do not touch.
    var serviceWorkerVersion = '4034236786';
    // Required by Flutter 3.x loader API
    _flutter = {
      buildConfig: {
        builds: [
          {
            compileTarget: "dart2js",
            renderer: "canvaskit",
            mainUrl: "main.dart.js"
          }
        ]
      }
    };
  </script>
  <!-- This script adds service worker registration to work offline. -->
  <script src="flutter.js" defer></script>
</head>
<body>
  <script>
    window.addEventListener('load', function(ev) {
      // Wait for _flutter.loader to be available (flutter.js loads with defer)
      function loadFlutter() {
        if (_flutter && _flutter.loader) {
          _flutter.loader.load({
            serviceWorker: {
              serviceWorkerVersion: serviceWorkerVersion,
            }
          });
        } else {
          // Retry after 50ms if not ready yet
          setTimeout(loadFlutter, 50);
        }
      }
      loadFlutter();
    });
  </script>
</body>
</html>
